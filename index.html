<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mela Multi-Guest Space</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #080810; font-family: 'Segoe UI', Roboto, sans-serif; color: #fff;
        }
        .app-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; z-index: 10; background: rgba(8,8,16,0.8); }
        .live-tag { background: #fe2c55; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        .coin-badge { background: rgba(255, 255, 255, 0.1); padding: 5px 12px; border-radius: 20px; font-size: 13px; }
        
        /* Interactive Live Stage Frame */
        .stage-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; position: relative; }
        #jitsi-meet-container { width: 100%; height: 100%; max-height: 380px; border-radius: 16px; overflow: hidden; background: #161722; border: 2px solid #25f4ee; box-shadow: 0 0 15px rgba(37, 244, 238, 0.2); }
        .start-notice { text-align: center; padding: 20px; color: #aaa; font-size: 14px; }

        /* Dynamic Tabs for Games and Private Whispers */
        .tabs-container { background: #161722; border-radius: 15px 15px 0 0; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.05); }
        .tabs-menu { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { flex: 1; padding: 10px; text-align: center; font-size: 12px; cursor: pointer; color: #888; transition: 0.3s; }
        .tab-btn.active { color: #25f4ee; font-weight: bold; border-bottom: 2px solid #25f4ee; }
        .tab-content { display: none; height: 100px; padding: 10px; overflow-y: auto; font-size: 13px; }
        .tab-content.active { display: block; }

        /* Live Chat Box styles */
        .chat-msg { margin-bottom: 4px; animation: fadeIn 0.3s ease; }
        .chat-system { color: #25f4ee; font-weight: bold; }
        .game-placeholder { text-align: center; color: #aaa; padding-top: 15px; }

        /* Control Tray */
        .bottom-controls { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #080810; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .action-btn { background: #fe2c55; border: none; color: white; padding: 12px 20px; border-radius: 25px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .icon-tray { display: flex; gap: 10px; }
        .icon-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.05); width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; user-select: none; }
        .icon-btn:active { background: rgba(255,255,255,0.3); }

        /* Slide Drawer */
        .gift-drawer { position: absolute; bottom: -100%; left: 0; width: 100%; background: #161722; border-radius: 24px 24px 0 0; padding: 20px; transition: 0.4s ease; z-index: 20; }
        .gift-drawer.open { bottom: 0; }
        .drawer-line { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 15px auto; }
        .gift-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .gift-card { background: #2f303d; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; border: 1px solid transparent; }
        .gift-card.selected { border-color: #00cd63; }
        .send-gift-btn { width: 100%; background: #00cd63; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-bar">
            <div class="live-tag">🔴 LIVE • Mela Space</div>
            <div class="coin-badge">🪙 <span id="my-coins">150</span> Mela</div>
        </div>

        <div class="stage-area">
            <div id="jitsi-meet-container">
                <div class="start-notice">
                    <p style="margin-top: 130px; font-weight: bold; color: #fff;">Mela Live Voice & Video Space</p>
                    <button class="action-btn" style="margin-top: 15px;" onclick="initializeMelaSpace()">🎙️ ስርጭት/መድረክ አስጀምር</button>
                </div>
            </div>
        </div>

        <div class="tabs-container">
            <div class="tabs-menu">
                <div class="tab-btn active" onclick="switchTab(event, 'chat')">💬 የቡድን ውይይት</div>
                <div class="tab-btn" onclick="switchTab(event, 'games')">🎮 ጨዋታዎች</div>
                <div class="tab-btn" onclick="switchTab(event, 'whisper')">🤫 ሹክሹክታ</div>
            </div>
            
            <div id="tab-chat" class="tab-content active">
                <div class="chat-msg"><b>ሲስተም:</b> ወደ Mela Multi-Guest Space እንኳን በሰላም መጡ! 🙌</div>
            </div>
            
            <div id="tab-games" class="tab-content">
                <div class="game-placeholder">
                    <button class="action-btn" style="background:#00cd63; margin-bottom:5px;" onclick="triggerGame('Lucky Wheel')">🎡 ዕድለኛ እሽክርክሪት ክፈት</button>
                    <button class="action-btn" style="background:#25f4ee; color:#000;" onclick="triggerGame('Bingo')">🎲 ቢንጎ ጨዋታ ጀምር</button>
                </div>
            </div>
            
            <div id="tab-whisper" class="tab-content">
                <div class="chat-msg" style="color:#aaa;"><i>ለተሳታፊዎች በግል ሚስጥራዊ መልዕክት ለመላክ...</i></div>
            </div>
        </div>

        <div class="bottom-controls">
            <button class="action-btn" id="main-join-btn" onclick="initializeMelaSpace()">🎙️ መድረክ ተቀላቀል</button>
            <div class="icon-tray">
                <div class="icon-btn" onclick="playEffect('applause')">👏</div>
                <div class="icon-btn" onclick="toggleBackgroundMusic()">🎵</div>
                <div class="icon-btn" onclick="toggleGiftDrawer()">🎁</div>
            </div>
        </div>

        <div class="gift-drawer" id="gift-panel">
            <div class="drawer-line" onclick="toggleGiftDrawer()"></div>
            <h4 style="margin-bottom:12px; font-size:13px; color:#aaa;">🎯 ስጦታው ለሚያገኘው ሰው:</h4>
            <div class="gift-grid">
                <div class="gift-card selected"><div>🌹</div><div style="font-size:12px;margin-top:2px;">ሮዝ</div><div style="font-size:10px;color:#00cd63;">5 ብር</div></div>
                <div class="gift-card"><div>🦁</div><div style="font-size:12px;margin-top:2px;">አንበሳ</div><div style="font-size:10px;color:#00cd63;">100 ብር</div></div>
            </div>
            <button class="send-gift-btn" onclick="sendGift()">💳 በቴሌብር ገዝተህ ላክ</button>
        </div>
    </div>

    <script>
        let api = null;
        let isMusicPlaying = false;
        let bgMusic = null;

        // Jitsi Multi-seat Stream Active Function
        function initializeMelaSpace() {
            const domain = "meet.jit.si";
            const options = {
                roomName: "Mela_Live_MultiGuest_Space_Room_9988", // ልዩ የክፍል ስም
                width: "100%",
                height: "100%",
                parentNode: document.getElementById("jitsi-meet-container"),
                userInfo: {
                    displayName: 'Melaku (Host)'
                },
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false,
                    prejoinPageEnabled: false, // ፈጣን መግቢያ
                    toolbarButtons: ['microphone', 'camera', 'chat', 'tileview', 'hangup']
                },
                interfaceConfigOverwrite: {
                    TILE_VIEW_MAX_COLUMNS: 3 // ወንበሮቹ በ3 ረድፍ (Grid) እንዲቀመጡ
                }
            };
            
            // የድሮውን ኖቲስ ማጽዳት
            document.getElementById("jitsi-meet-container").innerHTML = "";
            
            // አዲሱን የመልቲ ስርጭት መድረክ መክፈት
            api = new JitsiMeetExternalAPI(domain, options);
            
            document.getElementById("main-join-btn").innerText = "🚪 መድረክ ልቀቅ";
            document.getElementById("main-join-btn").onclick = () => { location.reload(); };
        }

        // Tab Switching Engine
        function switchTab(event, tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // SFX Module (ጭብጨባ)
        function playEffect(effectName) {
            let audioUrl = 'https://actions.google.com/sounds/v1/crowds/human_applause.ogg';
            let audio = new Audio(audioUrl);
            audio.play().catch(() => alert("👏 ጭብጨባ! (ድምፁ እንዲሰራ መጀመሪያ ስክሪኑን አንድ ጊዜ ይጫኑ)"));
        }

        // የጀርባ ሙዚቃ ማብሪያ/ማጥፊያ
        function toggleBackgroundMusic() {
            if (!isMusicPlaying) {
                bgMusic = new Audio('https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg'); 
                bgMusic.loop = true;
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    alert("🎵 የጀርባ ድምፅ ተጀምሯል።");
                }).catch(() => alert("እባክዎ መጀመሪያ ስክሪኑን ይጫኑ!"));
            } else {
                bgMusic.pause();
                isMusicPlaying = false;
                alert("🎵 የጀርባ ድምፅ ቆሟል።");
            }
        }

        function triggerGame(gameName) {
            alert(`የ ${gameName} መጫወቻ ገጽ አሁን ይከፈታል!`);
        }

        function toggleGiftDrawer() {
            document.getElementById("gift-panel").classList.toggle("open");
        }

        function sendGift() {
            alert("የቴሌብር የክፍያ ትዕዛዝ ወደ ስልክዎ ተልኳል!");
            toggleGiftDrawer();
        }
    </script>
</body>
</html>
