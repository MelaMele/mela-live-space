<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mela Multi-Guest Space</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #080810; font-family: 'Segoe UI', Roboto, sans-serif; color: #fff;
        }
        .app-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; z-index: 10; }
        .live-tag { background: #fe2c55; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        .coin-badge { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 5px 12px; border-radius: 20px; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Stage Area */
        .stage-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .host-section { text-align: center; margin-bottom: 25px; }
        .host-avatar { width: 90px; height: 90px; border-radius: 50%; background: #111; border: 3px solid #fe2c55; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 8px auto; box-shadow: 0 0 20px rgba(254, 44, 85, 0.4); }
        
        /* Grid Seats */
        .seats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 360px; padding: 10px; }
        .seat-node { text-align: center; position: relative; }
        .seat-circle { width: 65px; height: 65px; border-radius: 50%; background: #161722; border: 2px solid #25f4ee; display: flex; align-items: center; justify-content: center; font-size: 20px; margin: 0 auto 5px auto; cursor: pointer; }
        .seat-circle.empty { border-color: #444; color: #666; }
        .seat-name { font-size: 11px; color: #ddd; }

        /* Live Chat Area */
        .chat-area { height: 120px; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.6)); overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 5px; }
        .chat-msg { animation: fadeIn 0.3s ease; }
        .chat-system { color: #25f4ee; font-weight: bold; }

        /* Bottom Control Bar */
        .bottom-controls { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #080810; }
        .action-btn { background: #fe2c55; border: none; color: white; padding: 12px 24px; border-radius: 25px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .icon-tray { display: flex; gap: 15px; }
        .icon-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }

        /* Slide-up Gift Drawer */
        .gift-drawer { position: absolute; bottom: -100%; left: 0; width: 100%; background: #161722; border-radius: 24px 24px 0 0; padding: 20px; transition: 0.4s cubic-bezier(0.1, 0.8, 0.3, 1); z-index: 20; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .gift-drawer.open { bottom: 0; }
        .drawer-line { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 15px auto; cursor: pointer; }
        
        .target-select { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .target-opt { background: #2f303d; padding: 6px 15px; border-radius: 15px; font-size: 12px; cursor: pointer; border: 1px solid transparent; }
        .target-opt.selected { border-color: #fe2c55; color: #fe2c55; font-weight: bold; }

        .gift-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .gift-card { background: #2f303d; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; border: 1px solid transparent; }
        .gift-card.selected { border-color: #00cd63; }
        .gift-price { font-size: 10px; color: #00cd63; margin-top: 4px; }

        .send-gift-btn { width: 100%; background: #00cd63; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-bar">
            <div class="live-tag">🔴 LIVE • የቡድን ስርጭት</div>
            <div class="coin-badge">🪙 <span id="my-coins">150</span> Mela</div>
        </div>

        <div class="stage-area">
            <div class="host-section">
                <div class="host-avatar">🎙️</div>
                <div style="font-size:13px; font-weight:bold;">Melaku (Host)</div>
            </div>

            <div class="seats-grid">
                <div class="seat-node">
                    <div class="seat-circle">🔊</div>
                    <div class="seat-name">ዮናስ</div>
                </div>
                <div class="seat-node">
                    <div class="seat-circle">🔊</div>
                    <div class="seat-name">አልማዝ</div>
                </div>
                <div class="seat-node">
                    <div class="seat-circle empty">➕</div>
                    <div class="seat-name">ባዶ መቀመጫ</div>
                </div>
                <div class="seat-node">
                    <div class="seat-circle">🔇</div>
                    <div class="seat-name">ሳሙኤል</div>
                </div>
                <div class="seat-node">
                    <div class="seat-circle empty">➕</div>
                    <div class="seat-name">ባዶ መቀመጫ</div>
                </div>
                <div class="seat-node">
                    <div class="seat-circle empty">➕</div>
                    <div class="seat-name">ባዶ መቀመጫ</div>
                </div>
            </div>
        </div>

        <div class="chat-area" id="chat-box">
            <div class="chat-msg"><b>ዮናስ:</b> ሰላም እንዴት ናችሁ? 🙌</div>
            <div class="chat-msg chat-system">🎉 ሳሙኤል 🎁 ለ Melaku "🦁 አንበሳ" በስጦታ ሰጠ!</div>
        </div>

        <div class="bottom-controls">
            <button class="action-btn">🎙️ መቀመጫ ያዝ</button>
            <div class="icon-tray">
                <div class="icon-btn" onclick="toggleGiftDrawer()">🎁</div>
                <div class="icon-btn">🔗</div>
                <div class="icon-btn">🔊</div>
            </div>
        </div>

        <div class="gift-drawer" id="gift-panel">
            <div class="drawer-line" onclick="toggleGiftDrawer()"></div>
            <h4 style="margin-bottom:12px; font-size:14px; color:#aaa;">🎯 ስጦታው ለሚያገኘው ሰው:</h4>
            <div class="target-select">
                <div class="target-opt selected">Melaku (Host)</div>
                <div class="target-opt">ዮናስ</div>
                <div class="target-opt">አልማዝ</div>
                <div class="target-opt">ሳሙኤል</div>
            </div>
            <div class="gift-grid">
                <div class="gift-card selected"><div>🌹</div><div style="font-size:12px;margin-top:2px;">ሮዝ</div><div class="gift-price">5 ብር</div></div>
                <div class="gift-card"><div>🍦</div><div style="font-size:12px;margin-top:2px;">አይስክሬም</div><div class="gift-price">10 ብር</div></div>
                <div class="gift-card"><div>🦁</div><div style="font-size:12px;margin-top:2px;">አንበሳ</div><div class="gift-price">100 ብር</div></div>
            </div>
            <button class="send-gift-btn" onclick="sendGift()">💳 በቴሌብር ገዝተህ ላክ</button>
        </div>
    </div>

    <script>
        function toggleGiftDrawer() {
            document.getElementById("gift-panel").classList.toggle("open");
        }
        function sendGift() {
            alert("የቴሌብር የክፍያ ትዕዛዝ ወደ ስልክዎ ተልኳል!");
            toggleGiftDrawer();
        }
    </script>
</body>
</html>
